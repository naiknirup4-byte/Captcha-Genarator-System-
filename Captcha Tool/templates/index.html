<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTCHA Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 400px;
        }

        h2 {
            color: #333;
            margin-bottom: 24px;
            font-size: 22px;
        }

        .message {
            padding: 10px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .captcha-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .captcha-row img {
            border: 2px solid #ddd;
            border-radius: 6px;
            height: 80px;
            width: 280px;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2563eb;
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 8px;
            font-size: 22px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #1d4ed8;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #2563eb;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button[type="submit"]:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>CAPTCHA Verification</h2>

        {% if message %}
        <div class="message {{ message_type }}">{{ message }}</div>
        {% endif %}

        <div class="captcha-row">
            <img src="/captcha-image" alt="captcha">
            <a href="/refresh" class="refresh-btn" title="Get new captcha">&#x21bb;</a>
        </div>

        <form method="POST" action="/submit">
            <input type="text" name="captcha_input" placeholder="Enter captcha (case-sensitive)" required autocomplete="off" maxlength="8">
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
